version: '3.8'

services:
  pawbby-reborn:
    build: .
    container_name: pawbby-reborn
    ports:
      # Maps port 3333 on the host machine to port 3333 inside the container
      - "3333:3333"
    volumes:
      - ./data:/app/data
    environment:
      # Set to "false" to enable 1-Click Updates (not recommended in Docker)
      - DISABLE_UPDATES=true
      # Set to "true" to lock down webhooks to Discord/Slack/Telegram only
      - WEBHOOK_STRICT_MODE=false
      # Any custom webhook URL or other settings you'd normally put in .env
      # can be passed here as well.
    restart: unless-stopped
