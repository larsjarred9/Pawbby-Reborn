version: 2
updates:
  # Application dependencies (Nuxt app lives in web/)
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    groups:
      # Bundle low-risk minor/patch bumps into a single PR to reduce noise.
      # Major upgrades stay as individual PRs for careful review.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the CI/release workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"

  # Base image for the Docker build (node:22-alpine)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
